<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contenido — El Arte de los Prompts</title>
  <meta name="description" content="Catálogo de técnicas de ingeniería de prompts." />
  <meta name="keywords" content="ingeniería de prompts,prompt engineering,context engineering,LLM,inteligencia artificial" />
  <meta name="author" content="DesvoSoft" />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="El Arte de los Prompts - Contenido" />
  <meta property="og:description" content="Catálogo de técnicas de ingeniería de prompts." />
  <meta property="og:type" content="article" />
  <meta property="og:url" content="https://desvosoft.github.io/El-arte-de-los-prompts/content.html" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="El Arte de los Prompts - Contenido" />
  <link rel="canonical" href="https://desvosoft.github.io/El-arte-de-los-prompts/content.html" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <link rel="stylesheet" href="style.css" />
<style>
    :root {
      --bg: #0a0a0b;
      --surface: #141416;
      --border: #27272a;
      --text: #fafafa;
      --text-muted: #71717a;
      --accent: #3b82f6;
      --accent-subtle: rgba(59, 130, 246, 0.15);
      --accent-hover: #60a5fa;
      --success: #10b981;
      --success-subtle: rgba(16, 185, 129, 0.15);
      --warning: #f59e0b;
      --warning-subtle: rgba(245, 158, 11, 0.15);
      --purple: #8b5cf6;
      --purple-subtle: rgba(139, 92, 246, 0.15);
    }
    [data-theme="light"] {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e4e4e7;
      --text: #18181b;
      --text-muted: #71717a;
      --accent: #2563eb;
      --accent-subtle: rgba(37, 99, 235, 0.1);
      --accent-hover: #1d4ed8;
      --success: #059669;
      --success-subtle: rgba(5, 150, 105, 0.1);
      --warning: #d97706;
      --warning-subtle: rgba(217, 119, 6, 0.1);
      --purple: #7c3aed;
      --purple-subtle: rgba(124, 58, 237, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 11, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] .header { background: rgba(250, 250, 250, 0.9); }
    .logo { font-weight: 700; text-decoration: none; color: var(--text); font-size: 1.1rem; transition: color 0.2s; }
    .logo:hover { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .toggle {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* Layout */
    .layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      overflow-y: auto;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      background: var(--bg);
    }
    .sidebar h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .menu { list-style: }
    .menu-section { margin-bottom: 0.5rem; }
    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      padding: 0.5rem 0;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .menu-header:hover { opacity: 0.8; }
    .menu-arrow { font-size: 0.7rem; transition: transform 0.2s; }
    .menu-content { overflow: hidden; }
    .menu li { margin-bottom: 0.15rem; }
    .menu li { margin-bottom: 0.25rem; }
    .menu button {
      width: 100%;
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .menu button:hover { background: var(--surface); color: var(--text); }
    .menu button.active { background: var(--accent-subtle); color: var(--accent); font-weight: 500; }

    .main { flex: 1; padding: 2rem; max-width: 800px; }
    .breadcrumb { display: flex; gap: 0.5rem; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--accent); }

    /* Technique Content */
    .technique h1 { font-size: 1.75rem; margin-bottom: 0.75rem; font-weight: 700; }
    .technique .summary { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.7; }
    .technique .meta { display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .technique .meta span {
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text-muted);
    }
    
    /* Sections */
    .technique .section { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .technique .section:last-child { border-bottom: none; }
    .technique .section h2 { font-size: 1.1rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); font-weight: 600; }
    .technique .section-content { font-size: 0.95rem; color: var(--text-muted); line-height: 1.7; }
    .technique .section-content p { margin-bottom: 0.75rem; }
    .technique .section-content strong { color: var(--text); font-weight: 600; }
    .technique .section-content code { background: var(--surface); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
    .technique .section-content ul, .technique .section-content ol { margin: 0.75rem 0; padding-left: 1.5rem; }
    .technique .section-content li { margin-bottom: 0.5rem; }
    .technique ul { padding-left: 1.25rem; }
    .technique li { margin-bottom: 0.5rem; }
    
    /* Example Block */
    .example {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin: 1rem 0;
    }
    .example h4 { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; font-weight: 500; }
    .example pre {
      font-size: 0.85rem;
      white-space: pre-wrap;
      font-family: 'SF Mono', Monaco, 'JetBrains Mono', monospace;
      line-height: 1.6;
      background: var(--bg);
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
    }
    
    /* Deep Dive */
    .deep-dive {
      background: var(--purple-subtle);
      border-left: 3px solid var(--purple);
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 0 8px 8px 0;
    }
    .deep-dive h3 { font-size: 0.9rem; color: var(--purple); margin-bottom: 0.5rem; font-weight: 600; }
    .deep-dive li { margin-bottom: 0.5rem; }
    
    /* Scenario */
    .scenario {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
    }
    .scenario h4 { font-size: 0.9rem; color: var(--text); margin-bottom: 0.5rem; font-weight: 500; }
    .scenario pre { font-size: 0.8rem; white-space: pre-wrap; margin-bottom: 0.5rem; font-family: monospace; }
    .scenario .analysis { font-size: 0.85rem; color: var(--text-muted); font-style: italic; }
    
    /* Hands On */
    .hands-on {
      background: var(--success-subtle);
      border: 1px solid var(--success);
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.5rem 0;
    }
    .hands-on h2 { color: var(--success); font-size: 1rem; margin-bottom: 1rem; }
    .hands-on ol { padding-left: 1.25rem; }
    .hands-on li { margin-bottom: 0.5rem; color: var(--text); }
    
    /* Key Takeaways */
    .key-takeaways {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.5rem 0;
    }
    .key-takeaways h2 { font-size: 1rem; margin-bottom: 1rem; }
    .key-takeaways ul { list-style: none; }
    .key-takeaways li { 
      color: var(--text); 
      margin-bottom: 0.75rem;
      padding-left: 1.5rem;
      position: relative;
    }
    .key-takeaways li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: var(--success);
      font-weight: bold;
    }

    /* Best Practices */
    .best-practices {
      background: var(--accent-subtle);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.5rem 0;
    }
    .best-practices h2 { color: var(--accent); font-size: 1rem; margin-bottom: 1rem; }
    
    /* Errors */
    .errors {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.5rem 0;
    }
    .errors h2 { color: #ef4444; font-size: 1rem; margin-bottom: 1rem; }
    .errors li { color: var(--text-muted); margin-bottom: 0.5rem; }
    .errors li::before {
      content: "✗ ";
      color: #ef4444;
    }

    /* Empty State */
    .empty { 
      text-align: center; 
      padding: 4rem 2rem; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
    }
    .empty h2 { font-size: 1.75rem; margin-bottom: 0.5rem; font-weight: 600; }
    .empty p { color: var(--text-muted); font-size: 1rem; margin-bottom: 1.5rem; }
    .empty .quick-links { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    .empty .quick-links a {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s;
    }
    .empty .quick-links a:hover { border-color: var(--accent); color: var(--accent); }

    /* Particles background */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      opacity: 0;
      animation: float 20s infinite linear;
    }
    .particle:nth-child(odd) { background: var(--accent); }
    .particle:nth-child(even) { background: var(--success); }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }
    .layout { position: relative; z-index: 1; }

    /* Footer */
    .footer { padding: 1.5rem; text-align: center; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .technique { animation: fadeIn 0.3s ease-out; }

    /* Responsive */
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; overflow-y: auto; }
      .main { padding: 1.5rem; }
      .technique h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  
  <header class="header">
    <a href="index.html" class="logo">El Arte de los Prompts</a>
    <div class="header-right">
      <button class="toggle" onclick="toggleTheme()">☾</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h3>Secciones</h3>
      <ul class="menu" id="menu"></ul>
    </aside>
    <main class="main" id="main">
      <div class="empty">
        <h2>Bienvenido al catálogo</h2>
        <p>Selecciona una técnica del menú lateral para comenzar.</p>
        <div class="quick-links">
          <a href="content.html?topic=que-es-contexto">Fundamentos</a>
          <a href="content.html?topic=anatomia-prompt">Técnicas</a>
          <a href="content.html?topic=intro-rag">RAG</a>
          <a href="content.html?topic=agentes-ia">Agentes</a>
        </div>
      </div>
    </main>
  </div>

  <footer class="footer">
    <p>&copy; 2026 DesvoSoft · Ingeniería de prompts</p>
  </footer>

  <script>
    let sections = [];
    let flatTopics = [];

    // Theme
    function initTheme() {
      const saved = localStorage.getItem('theme');
      const isDark = saved === 'dark' || !saved;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      document.querySelector('.toggle').textContent = isDark ? '☾' : '☀';
    }
    function toggleTheme() {
      const root = document.documentElement;
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.querySelector('.toggle').textContent = next === 'dark' ? '☾' : '☀';
    }

    // Particles
    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      const colors = ['#3b82f6', '#10b981', '#60a5fa', '#34d399'];
      for (let i = 0; i < 80; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 20 + 's';
        p.style.animationDuration = (15 + Math.random() * 10) + 's';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        container.appendChild(p);
      }
    }

    // Data
    async function loadData() {
      const res = await fetch('topics.json');
      const data = await res.json();
      sections = data.sections || [];
      sections.forEach(s => {
        s.topics = s.topics || [];
        s.topics.forEach(t => {
          flatTopics.push({ section: s, topic: t });
        });
      });
      // Detailed lessons loaded on demand via loadDetailedLesson(id)
    }

    // Detailed lessons cached
    let detailedLessons = {};

    // Load single detailed lesson on demand
    async function loadDetailedLesson(id) {
      if (detailedLessons[id]) return detailedLessons[id];
      try {
        const idxRes = await fetch('content/index.json');
        const idx = await idxRes.json();
        const mod = idx.modules.find(m => m.id === id);
        if (!mod) return null;
        const modRes = await fetch('content/module-' + id + '.json');
        const modData = await modRes.json();
        for (const lesson of modData.lessons) {
          detailedLessons[lesson.id] = lesson;
        }
        return detailedLessons[id] || null;
      } catch (e) {
        console.log('Lesson ' + id + ' not found');
        return null;
      }
    }

    // Render menu with collapsible sections
    function renderMenu() {
      const menu = document.getElementById('menu');
      menu.innerHTML = '';
      sections.forEach((section, idx) => {
        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'menu-section';
        
        // Header (clickable to collapse/expand)
        const header = document.createElement('div');
        header.className = 'menu-header';
        header.innerHTML = `<span>${section.title}</span><span class="menu-arrow">▾</span>`;
        header.style.cursor = 'pointer';
        header.onclick = () => {
          const content = sectionDiv.querySelector('.menu-content');
          const arrow = header.querySelector('.menu-arrow');
          const isOpen = content.style.display !== 'none';
          content.style.display = isOpen ? 'none' : 'block';
          arrow.textContent = isOpen ? '▸' : '▾';
        };
        
        // Content (topic list)
        const content = document.createElement('div');
        content.className = 'menu-content';
        
        const ul = document.createElement('ul');
        ul.className = 'menu';
        section.topics.forEach(topic => {
          const li = document.createElement('li');
          const btn = document.createElement('button');
          btn.textContent = topic.title;
          btn.style.paddingLeft = '1rem';
          btn.onclick = () => renderTopic(topic.id);
          li.appendChild(btn);
          ul.appendChild(li);
        });
        content.appendChild(ul);
        
        sectionDiv.appendChild(header);
        sectionDiv.appendChild(content);
        menu.appendChild(sectionDiv);
        
        // Auto-collapse sections after first
        if (idx > 2) {
          content.style.display = 'none';
          sectionDiv.querySelector('.menu-arrow').textContent = '▸';
        }
      });
    }

    // Markdown rendering: **bold**, *italic*, `code`
    function renderMd(text) {
      if (!text) return '';
      return text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    // Render topic
    async function renderTopic(id) {
      const entry = flatTopics.find(e => e.topic.id === id);
      if (!entry) {
        // Fallback: try to render basic topic without detailed lesson
        const basicTopic = flatTopics.find(e => e.topic.id === id);
        if (basicTopic) {
          renderBasicTopic(basicTopic.topic);
        } else {
          document.getElementById('main').innerHTML = '<div class="empty"><h2>Tema no encontrado</h2><p>Selecciona una técnica del menú.</p></div>';
        }
        return;
      }
      const { section, topic } = entry;
      
      // Update active - use event from the click handler
      if (event) {
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
      }

      // Load detailed lesson on demand
      const lesson = await loadDetailedLesson(id);
      const main = document.getElementById('main');
      
      let content = `
        <nav class="breadcrumb">
          <a href="index.html">Inicio</a>
          <span>/</span>
          <span>${topic.title}</span>
        </nav>
        <article class="technique">
          <h1>${topic.title}</h1>
          <p class="summary">${topic.summary || ''}</p>
`;

      // If detailed lesson exists, render rich content
      if (lesson && lesson.sections) {
        for (const sec of lesson.sections) {
          content += `<div class="section"><h2>${sec.title}</h2>`;
          content += `<div class="section-content">${renderMd(sec.content)}</div>`;
          
          if (sec.deepDive) {
            content += `<div class="deep-dive"><h3>${sec.deepDive.title}</h3><ul>`;
            for (const item of sec.deepDive.items) {
              content += `<li>${renderMd(item)}</li>`;
            }
            content += `</ul></div>`;
          }
          
          if (sec.examples && sec.examples.length) {
            for (const ex of sec.examples) {
              content += `<div class="example"><h4>${ex.title}</h4><pre>${ex.code || ex.prompt}</pre></div>`;
            }
          }
          
          if (sec.scenarios) {
            for (const scen of sec.scenarios) {
              content += `<div class="scenario"><h4>${scen.title}</h4><pre>${JSON.stringify(scen.code, null, 2)}</pre>`;
              content += `<p class="analysis"><strong>Análisis:</strong> ${scen.analysis}</p></div>`;
            }
          }
          
          content += `</div>`;
        }
        
        if (lesson.handsOn) {
          content += `<div class="section hands-on"><h2>${lesson.handsOn.title}</h2><ol>`;
          for (const step of lesson.handsOn.steps) {
            content += `<li>${step}</li>`;
          }
          content += `</ol></div>`;
        }
        
        if (lesson.keyTakeaways) {
          content += `<div class="section key-takeaways"><h2>Puntos Clave</h2><ul>`;
          for (const kt of lesson.keyTakeaways) {
            content += `<li>${kt}</li>`;
          }
          content += `</ul></div>`;
        }
        
        if (lesson.bestPractices) {
          content += `<div class="section best-practices"><h2>Mejores Prácticas</h2><ul>`;
          for (const bp of lesson.bestPractices) {
            content += `<li>${bp}</li>`;
          }
          content += `</ul></div>`;
        }
        
        if (lesson.errors) {
          content += `<div class="section errors"><h2>Errores Comunes</h2><ul>`;
          for (const err of lesson.errors) {
            content += `<li>${err}</li>`;
          }
          content += `</ul></div>`;
        }
      } else {
        // Fallback to basic fields
        content += `${topic.definition ? `<div class="section"><h2>Definición</h2><p>${topic.definition}</p></div>` : ''}
          ${topic.when ? `<div class="section"><h2>Cuándo usarla</h2><p>${topic.when}</p></div>` : ''}
          ${topic.steps && topic.steps.length ? `<div class="section"><h2>Pasos</h2><ul>${topic.steps.map(s => '<li>'+s+'</li>').join('')}</ul></div>` : ''}
          ${topic.example ? `<div class="section"><h2>Ejemplo</h2><div class="example"><h4>${topic.example.title}</h4><pre>${topic.example.prompt}</pre></div></div>` : ''}
          ${topic.errors && topic.errors.length ? `<div class="section"><h2>Errores Comunes</h2><ul>${topic.errors.map(e => '<li>'+e+'</li>').join('')}</ul></div>` : ''}
          ${topic.bestPractices && topic.bestPractices.length ? `<div class="section"><h2>Mejores Prácticas</h2><ul>${topic.bestPractices.map(b => '<li>'+b+'</li>').join('')}</ul></div>` : ''}
          ${topic.related && topic.related.length ? `<div class="section"><h2>Temas Relacionados</h2><p>${topic.related.join(', ')}</p></div>` : ''}`;
      }
      
      content += `</article>`;
      main.innerHTML = content;
    }

    // Render basic topic from topics.json (fallback)
    function renderBasicTopic(topic) {
      const main = document.getElementById('main');
      main.innerHTML = `
        <nav class="breadcrumb">
          <a href="index.html">Inicio</a>
          <span>/</span>
          <span>${topic.title}</span>
        </nav>
        <article class="technique">
          <h1>${topic.title}</h1>
          <p class="summary">${topic.summary || ''}</p>
          ${topic.definition ? `<div class="section"><h2>Definición</h2><p>${topic.definition}</p></div>` : ''}
          ${topic.when ? `<div class="section"><h2>Cuándo usarla</h2><p>${topic.when}</p></div>` : ''}
          ${topic.steps && topic.steps.length ? `<div class="section"><h2>Pasos</h2><ul>${topic.steps.map(s => '<li>'+s+'</li>').join('')}</ul></div>` : ''}
          ${topic.example ? `<div class="section"><h2>Ejemplo</h2><div class="example"><h4>${topic.example.title}</h4><pre>${topic.example.prompt}</pre></div></div>` : ''}
          ${topic.errors && topic.errors.length ? `<div class="section"><h2>Errores Comunes</h2><ul>${topic.errors.map(e => '<li>'+e+'</li>').join('')}</ul></div>` : ''}
          ${topic.bestPractices && topic.bestPractices.length ? `<div class="section"><h2>Mejores Prácticas</h2><ul>${topic.bestPractices.map(b => '<li>'+b+'</li>').join('')}</ul></div>` : ''}
          ${topic.related && topic.related.length ? `<div class="section"><h2>Temas Relacionados</h2><p>${topic.related.join(', ')}</p></div>` : ''}
        </article>
      `;
    }

    // URL params
    function handleUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const topicParam = params.get('topic');
      const sectionParam = params.get('section');
      
      // Support both ?topic=ID and ?section=ID formats
      const topicId = topicParam || sectionParam;
      
      if (topicId) {
        const topic = flatTopics.find(t => t.topic.id === topicId);
        if (topic) {
          renderTopic(topicId);
        } else {
          document.getElementById('main').innerHTML = '<div class="empty"><h2>Selecciona una técnica</h2><p>Explora las secciones en el menú lateral.</p></div>';
        }
      }
    }

    // Init
    initTheme();
    createParticles();
    loadData().then(() => {
      renderMenu();
      handleUrlParams();
    });
  </script>
</body>
</html>
